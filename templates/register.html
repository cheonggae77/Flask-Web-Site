{% extends "base.html" %}

{% block title %}회원가입 | Flask Login Site{% endblock %}

{% block content %}
<section class="card auth-card">
    <h1>회원가입</h1>
    <p class="muted">새 계정을 만들고 바로 로그인할 수 있습니다.</p>
    <form method="post" class="auth-form">
        <label for="username">아이디</label>
        <input id="username" name="username" type="text" placeholder="아이디 입력" required>

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호 입력" required>

        <label for="confirm_password">비밀번호 확인</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="비밀번호 다시 입력" required>

        <button class="button primary" type="submit">회원가입</button>
    </form>
    <p class="form-link">이미 계정이 있나요? <a href="{{ url_for('login') }}">로그인</a></p>
</section>
{% endblock %}
