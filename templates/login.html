{% extends "base.html" %}

{% block title %}로그인 | Flask Board Site{% endblock %}

{% block content %}
<section class="card auth-card">
    <h1>로그인</h1>
    <p class="muted">가입한 계정으로 로그인하면 게시판과 대시보드를 사용할 수 있습니다.</p>
    <form method="post" class="auth-form">
        <label for="username">아이디</label>
        <input id="username" name="username" type="text" placeholder="아이디 입력" required>

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호 입력" required>

        <button class="button primary" type="submit">로그인</button>
    </form>
    <p class="form-link">계정이 없나요? <a href="{{ url_for('register') }}">회원가입</a></p>
</section>
{% endblock %}
